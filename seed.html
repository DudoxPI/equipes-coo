<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Popular dados — Equipes Coo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #090d14; color: #e8eaf0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100dvh; padding: 24px; gap: 16px;
  }
  h2 { font-size: 22px; font-weight: 700; }
  p  { color: #8b8fa8; font-size: 14px; text-align: center; max-width: 360px; line-height: 1.6; }
  .stats { display: flex; gap: 20px; margin: 8px 0; }
  .stat  { text-align: center; }
  .stat b { display: block; font-size: 32px; font-weight: 800; color: #4f8ef7; }
  .stat span { font-size: 12px; color: #8b8fa8; }
  .warn { background: rgba(240,200,60,.08); border: 1px solid rgba(240,200,60,.25); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: #f5c842; max-width: 360px; text-align: center; }
  button {
    background: linear-gradient(135deg, #6ba8ff, #4f8ef7);
    border: none; border-radius: 40px; padding: 14px 32px;
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  button:hover   { opacity: .88; }
  button:active  { transform: scale(.96); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  #msg { font-size: 14px; color: #8b8fa8; min-height: 20px; }
  a { color: #4f8ef7; text-decoration: none; font-size: 14px; }
  a:hover { text-decoration: underline; }

  /* stubs requeridos por sync.js */
  #loadOv, #syncDot, #toast { display: none; }
</style>
</head>
<body>

<h2>Popular dados de exemplo</h2>
<p>Adiciona líderes, funcionários, atividades e áreas ao banco e salva na nuvem.</p>

<div class="stats">
  <div class="stat"><b>5</b><span>Líderes</span></div>
  <div class="stat"><b>60</b><span>Funcionários</span></div>
  <div class="stat"><b>30</b><span>Atividades</span></div>
  <div class="stat"><b>20</b><span>Áreas</span></div>
</div>

<div class="warn">⚠️ Os dados atuais serão substituídos.</div>

<button id="btnClear" onclick="limparTudo()" style="background:linear-gradient(135deg,#f06080,#c0304a)">🗑️ Limpar tudo</button>
<button id="btnPop" onclick="popularDados()">Adicionar dados de exemplo</button>
<div id="msg"></div>
<a href="banco.html">← Voltar ao banco</a>

<!-- stubs para sync.js não quebrar -->
<div id="loadOv"></div>
<div id="syncDot"></div>
<div id="toast"></div>

<script src="js/config.js"></script>
<script src="js/sync.js"></script>
<script>
const LIDERES = [
  'David',
  'Dudox',
  'Carlos Eduardo Silva',
  'Fernando Dias',
  'Patrícia Borges'
];

  'Anderson Ferreira',   'Adriana Santos',      'Alexandre Pereira',
  'Ana Paula Lima',      'André Costa',         'Bruno Oliveira',
  'Camila Rodrigues',    'Carlos Eduardo Silva', 'Cláudio Nascimento',
  'Cristiane Alves',     'Daniel Martins',       'Diego Carvalho',
  'Edson Gomes',         'Eduardo Ribeiro',      'Fabiana Torres',
  'Fábio Mendes',        'Felipe Barbosa',       'Fernanda Castro',
  'Fernando Dias',       'Gabriela Nunes',       'Gilson Araújo',
  'Gustavo Cardoso',     'Henrique Monteiro',    'Igor Teixeira',
  'Jéssica Rocha',       'João Pedro Viana',     'Josiane Correia',
  'Juliana Melo',        'Leandro Freitas',      'Lucas Batista',
  'Marcelo Pinto',       'Marcos Vieira',        'Maria Clara Souza',
  'Matheus Cunha',       'Michele Fonseca',      'Nilton Cruz',
  'Patrícia Borges',     'Paulo Sérgio Leal',    'Pedro Henrique Lima',
  'Rafael Moura',        'Renata Campos',        'Renato Azevedo',
  'Ricardo Moreira',     'Roberto Cavalcanti',   'Rodrigo Macedo',
  'Rogério Andrade',     'Sandra Matos',         'Sérgio Nogueira',
  'Simone Duarte',       'Tatiane Paiva',        'Thiago Ramos',
  'Vanessa Brito',       'Vera Lúcia Marques',   'Victor Hugo Coelho',
  'Wagner Lima',         'Welinton Souza',       'Wellington Araújo',
  'Weslley Santos',      'Yago Fernandes',       'Zuleica Pires',
  'Adelson Rezende'
];

const ATIVIDADES = [
  'Inspeção de equipamentos',   'Carregamento de veículos',
  'Descarregamento',            'Manutenção preventiva',
  'Manutenção corretiva',       'Limpeza geral',
  'Relatório diário',           'Treinamento de equipe',
  'Vistoria de EPIs',           'Controle de estoque',
  'Inventário',                 'Ronda de segurança',
  'Apoio à produção',           'Calibração de instrumentos',
  'Teste de equipamentos',      'Montagem',
  'Desmontagem',                'Soldagem',
  'Pintura industrial',         'Transporte interno',
  'Controle de acesso',         'Inspeção de segurança',
  'Conferência de materiais',   'Separação de pedidos',
  'Embalagem',                  'Paletização',
  'Lubrificação de máquinas',   'Instalação elétrica',
  'Levantamento de riscos',     'Organização de área'
];

const AREAS = [
  'Almoxarifado',               'Manutenção Elétrica',
  'Manutenção Mecânica',        'Produção — Linha A',
  'Produção — Linha B',         'Logística',
  'Expedição',                  'Recebimento',
  'Controle de Qualidade',      'Segurança do Trabalho',
  'Refeitório',                 'Portaria',
  'TI',                         'Recursos Humanos',
  'Administrativo',             'Compras',
  'Laboratório',                'Utilidades',
  'Limpeza e Conservação',      'Transporte'
];

async function limparTudo() {
  const btn = document.getElementById('btnClear');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = 'Limpando…';

  banco = { lideres: [], funcionarios: [], atividades: [], areas: [] };
  prog  = { semanaInicio: '', dias: {}, atualizadoEm: null };
  salvarLocal();

  try {
    await Promise.all([
      salvarBin('banco.json', banco),
      salvarBin('prog.json',  prog)
    ]);
    msg.textContent = '✓ Banco e programação limpos!';
    btn.textContent = 'Limpo ✓';
  } catch (e) {
    msg.textContent = '⚠️ Limpo localmente. Sem conexão com a nuvem.';
    btn.disabled = false;
  }
}

async function popularDados() {
  const btn = document.getElementById('btnPop');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = 'Gerando dados…';

  const mkList = (arr, extra = {}) => arr.map(async nome => {
    await new Promise(r => setTimeout(r, 1));
    return { id: uid(), nome, ...extra };
  });

  const lideres     = await Promise.all(mkList(LIDERES,     { ausencias: [] }));
  const funcionarios = await Promise.all(mkList(FUNCIONARIOS, { ausencias: [] }));
  const atividades   = await Promise.all(mkList(ATIVIDADES));
  const areas        = await Promise.all(mkList(AREAS));

  banco = { lideres, funcionarios, atividades, areas };
  salvarLocal();

  msg.textContent = 'Enviando para a nuvem…';
  try {
    const ok = await salvarBin('banco.json', banco);
    if (ok) {
      msg.textContent = `✓ ${lideres.length} líderes, ${funcionarios.length} funcionários, ${atividades.length} atividades e ${areas.length} áreas salvos!`;
      btn.textContent = 'Concluído ✓';
    } else {
      msg.textContent = '⚠️ Salvo localmente, mas erro ao enviar para nuvem.';
      btn.disabled = false;
    }
  } catch (e) {
    msg.textContent = '⚠️ Salvo localmente. Sem conexão com a nuvem.';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
