<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f13"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Equipes"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="manifest" href="manifest.json"/>
<title>Equipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --radius: 14px;
    --radius-sm: 8px;
    --bottom-nav: 104px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  h1,h2,h3 { font-family: 'Syne', sans-serif; }

  /* ── HEADER ── */
  .app-header {
    position: sticky; top:0; z-index:100;
    background: linear-gradient(180deg, #0f0f13 60%, transparent);
    padding: 18px 20px 10px;
    display: flex; align-items:center; justify-content:space-between;
  }
  .app-header h1 { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .app-header span { color: var(--accent); }

  /* ── PAGES ── */
  .page { display:none; padding: 0 16px; padding-bottom: calc(var(--bottom-nav) + 80px); }
  .page.active { display:block; }

  /* ── BOTTOM NAV (5 itens) ── */
  .bottom-nav {
    position: fixed; bottom:0; left:0; right:0;
    height: var(--bottom-nav);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 200;
  }
  .nav-reset-strip {
    display:flex; align-items:center; justify-content:center;
    padding: 5px 16px; border-bottom: 1px solid var(--border);
    flex-shrink:0;
  }
  .nav-reset-btn {
    background:none; border:none; color:var(--text-muted);
    font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer;
    padding: 4px 24px; border-radius:6px; width:100%;
    transition: color .2s, background .2s;
  }
  .nav-reset-btn:hover { color:var(--accent2); background: rgba(247,106,138,0.08); }
  .nav-btns-row { display:flex; flex:1; }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; background:none; border:none; color: var(--text-muted);
    font-family:'DM Sans',sans-serif; font-size:9px; cursor:pointer;
    transition: color .2s; padding: 0 2px;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width:20px; height:20px; }
  .nav-btn .dot {
    width:5px; height:5px; border-radius:50%; background:var(--accent);
    opacity:0; transition: opacity .2s;
  }
  .nav-btn.active .dot { opacity:1; }

  /* ── CRUD PAGE ── */
  .section-title {
    font-size:12px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--text-muted);
    margin: 20px 0 10px;
  }
  .add-form { display:flex; gap:8px; margin-bottom:6px; }
  .add-form input {
    flex:1; background:var(--surface); border:1px solid var(--border);
    border-radius: var(--radius-sm); padding:11px 14px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
    outline:none; transition: border-color .2s;
  }
  .add-form input:focus { border-color: var(--accent); }
  .add-form input::placeholder { color:var(--text-muted); }
  .add-btn {
    background: var(--accent); border:none; border-radius:var(--radius-sm);
    width:44px; height:44px; color:#fff; font-size:22px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .2s, transform .15s;
  }
  .add-btn:active { transform:scale(0.92); }
  .item-list { display:flex; flex-direction:column; gap:8px; }
  .item-row {
    background:var(--surface); border-radius:var(--radius-sm);
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    border:1px solid var(--border);
    animation: fadeIn .25s ease;
    transition: transform .15s, background .15s;
    overflow:hidden; position:relative;
    user-select:none;
  }
  .item-row.em-dispensa { border-color: rgba(231,76,60,0.3); }
  .item-row.em-dispensa .item-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .dispensa-cross {
    color: #e74c3c; font-size:18px; font-weight:700;
    flex-shrink:0; line-height:1;
  }
  .item-color-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .item-name { flex:1; font-size:14px; }
  .del-btn {
    background:none; border:none; color:var(--text-muted); cursor:pointer;
    font-size:18px; line-height:1; padding:2px 4px; transition: color .2s;
  }
  .del-btn:hover { color:var(--accent2); }

  /* ── DISTRIBUIÇÃO ── */
  .dist-layout {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin-top:8px;
    height: calc(100dvh - 216px);
  }
  .dist-col-wrap { display:flex; flex-direction:column; overflow:hidden; }
  .dist-col-scroll { flex:1; overflow-y:auto; padding-right:2px; }
  .col-title {
    font-size:11px; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--text-muted); font-weight:600; margin-bottom:8px; padding-left:2px;
  }

  /* Cabeçalho cíclico com setas */
  .col-title-row {
    display:flex; align-items:center; gap:4px; margin-bottom:8px;
    font-size:11px; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--text-muted); font-weight:600;
  }
  .col-title-row span { flex:1; text-align:center; }
  .arrow-btn {
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; font-size:12px; padding:10px 14px;
    border-radius:6px; transition: color .15s, background .15s;
    line-height:1; flex-shrink:0;
  }
  .arrow-btn:hover { color:var(--text); background:var(--surface2); }
  .arrow-btn:active { background:var(--surface2); }

  /* Líderes */
  .leaders-col { display:flex; flex-direction:column; gap:8px; }
  .leader-card {
    border-radius:var(--radius); padding:10px;
    border:2px solid transparent;
    transition: border-color .2s, box-shadow .2s;
    min-height:56px; cursor:pointer; position:relative;
  }
  .leader-card.selected-target {
    border-color: rgba(255,255,255,0.6) !important;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.12);
  }
  .leader-name {
    font-family:'Syne',sans-serif; font-size:15px; font-weight:700;
    color:#fff; margin-bottom:6px;
  }
  .leader-members { display:flex; flex-direction:column; gap:4px; }
  .member-chip {
    background:rgba(0,0,0,0.25); border-radius:6px;
    padding:6px 8px; font-size:13px; color:#fff;
    display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .member-chip span.member-label { flex:1; }
  .member-chip .remove-x {
    font-size:16px; line-height:1; opacity:0.7;
    cursor:pointer; padding:2px 4px; border-radius:4px;
    transition: opacity .15s, background .15s; flex-shrink:0;
  }
  .member-chip .remove-x:hover { opacity:1; background:rgba(255,255,255,0.15); }

  /* Coluna direita (chips) */
  .followers-col { display:flex; flex-direction:column; gap:6px; }
  .follower-chip {
    background: var(--surface2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:12px 12px;
    font-size:15px; font-weight:500;
    cursor:pointer;
    transition: border-color .2s, opacity .2s, background .2s;
    user-select:none;
    display:flex; align-items:center; gap:6px;
  }
  .follower-chip.selected-follower {
    border-color: var(--accent);
    background: rgba(124,106,247,0.18);
    box-shadow: 0 0 0 2px rgba(124,106,247,0.3);
  }

  /* FAB ROW (2 botões) */
  .fab-row {
    position:fixed; bottom:calc(var(--bottom-nav) + 14px);
    left:50%; transform:translateX(-50%);
    display:flex; gap:8px;
    opacity:0; pointer-events:none; transition:opacity .3s;
    z-index:150;
  }
  .fab-row.visible { opacity:1; pointer-events:all; }
  .fab {
    background: linear-gradient(135deg, #7c6af7, #f76a8a);
    border:none; border-radius:40px;
    padding:11px 15px; color:#fff;
    font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
    cursor:pointer; display:flex; align-items:center; gap:5px;
    box-shadow: 0 6px 24px rgba(124,106,247,0.45);
    transition: transform .2s, box-shadow .2s;
    white-space:nowrap;
  }
  .fab:active { transform:scale(0.95); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.75);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:500; opacity:0; pointer-events:none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border-radius:20px 20px 0 0;
    padding:24px 20px 36px; width:100%; max-width:480px;
    transform: translateY(40px);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h3 { font-size:18px; margin-bottom:6px; }
  .modal p { color:var(--text-muted); font-size:13px; margin-bottom:20px; }
  .modal-copy-area {
    background:var(--surface2); border-radius:var(--radius-sm);
    padding:16px; font-size:13px; line-height:1.8;
    white-space:pre-wrap; color:var(--text);
    max-height:55vh; overflow-y:auto; border:1px solid var(--border);
    margin-bottom:16px;
  }
  .modal-actions { display:flex; gap:8px; }
  .btn {
    flex:1; padding:13px; border:none; border-radius:var(--radius-sm);
    font-family:'Syne',sans-serif; font-weight:700; font-size:14px;
    cursor:pointer; transition: transform .15s, opacity .2s;
  }
  .btn:active { transform:scale(0.96); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-ghost { background:var(--surface2); color:var(--text); }

  /* EMPTY */
  .empty {
    text-align:center; padding:40px 20px;
    color:var(--text-muted); font-size:14px;
  }
  .empty span { font-size:36px; display:block; margin-bottom:10px; }

  /* RESET BTN */
  .reset-btn {
    width:100%; margin-top:16px;
    padding:12px; background:none;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:13px;
    cursor:pointer; transition: border-color .2s, color .2s;
  }
  .reset-btn:hover { border-color:var(--accent2); color:var(--accent2); }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* TOAST */
  .toast {
    position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
    background:#fff; color:#111; border-radius:40px;
    padding:10px 20px; font-size:13px; font-weight:600;
    z-index:999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <h1>equi<span>pes</span></h1>
  <div style="display:flex;align-items:center;gap:6px;">
    <button onclick="changeDay(-1)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">−</button>

<!-- PAGES -->
<div id="pageDistribuicao" class="page active">

<div id="pageLiderados" class="page">

<div id="pageAtividades" class="page">

</div>

<div id="pageLocais" class="page">

  <div class="add-form">
    <input id="inputLocal" type="text" placeholder="Nome do local..." maxlength="30"/>
    <button class="add-btn" onclick="addLocal()">+</button>

  <div class="section-title">Lista</div>
  <div class="item-list" id="listLocais"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">

  </div>
  <div class="nav-btns-row">
  <button class="nav-btn active" onclick="goTo('Distribuicao',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1.5"/>
      <rect x="14" y="3" width="7" height="7" rx="1.5"/>
      <rect x="3" y="14" width="7" height="7" rx="1.5"/>
      <rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
    <div class="dot"></div>
    Distribuição
  </button>
  <button class="nav-btn" onclick="goTo('Lideres',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    <div class="dot"></div>
    Líderes
  </button>
  <button class="nav-btn" onclick="goTo('Liderados',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="7" r="3"/>
      <path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      <path d="M21 20c0-3.3-2.7-6-6-6"/>
    </svg>
    <div class="dot"></div>
    Liderados
  </button>
  <button class="nav-btn" onclick="goTo('Atividades',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    Locais

  </div>

<!-- FAB ROW -->
<div class="fab-row" id="fabRow">
  <button class="fab" onclick="openListaModal('coordenacao')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <path d="M9 12h6M9 16h4"/>
    </svg>
    Coordenação
  </button>
  <button class="fab" onclick="openListaModal('equipes')">

      <path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      <path d="M21 20c0-3.3-2.7-6-6-6"/>
    </svg>
    Equipes
  </button>
</div>

<!-- MODAL LISTA -->
<div class="modal-overlay" id="modalLista">
  <div class="modal">
    <h3 id="modalTitulo">Lista do dia 📋</h3>
    <p>Copie e cole no WhatsApp</p>
    <div class="modal-copy-area" id="listaTexto"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modalLista')">Fechar</button>
      <button class="btn btn-primary" onclick="copiarLista()">📋 Copiar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
const DB = {
  get: k => JSON.parse(localStorage.getItem(k) || 'null'),
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

let lideres            = DB.get('lideres')            || [];
let liderados          = DB.get('liderados')          || [];
let atividades         = DB.get('atividades')         || [];
let locais             = DB.get('locais')             || [];
let dispensas          = DB.get('dispensas')          || []; // [lideradoId,...] em dispensa médica
let distribuicao       = DB.get('distribuicao')       || {}; // { liderId: [lideradoId,...] }
let distribuicaoAtiv   = DB.get('distribuicaoAtiv')   || {}; // { liderId: [atividadeId,...] } repetível
let distribuicaoLocais = DB.get('distribuicaoLocais') || {}; // { liderId: [localId,...] } repetível

const save = () => {
  DB.set('lideres', lideres);
  DB.set('liderados', liderados);
  DB.set('atividades', atividades);
  DB.set('locais', locais);
  DB.set('dispensas', dispensas);
  DB.set('distribuicao', distribuicao);
  DB.set('distribuicaoAtiv', distribuicaoAtiv);
  DB.set('distribuicaoLocais', distribuicaoLocais);
};

// ── COLORS ──
const COLORS = [
  '#e74c8b','#f7934a','#f7c94a','#4af77a','#4ac9f7',
  '#7c6af7','#c46af7','#f76a6a','#6af7c4','#f7f76a',
  '#fa8231','#2bcbba','#a29bfe','#fd79a8','#55efc4',
  '#e17055','#74b9ff','#b2bec3','#00cec9','#6c5ce7',
];
const usedColors = () => lideres.map(l => l.color);
const alpha = arr => [...arr].sort((a,b) => a.nome.localeCompare(b.nome, 'pt-BR'));
const randomColor = () => {
  const avail = COLORS.filter(c => !usedColors().includes(c));
  const pool = avail.length ? avail : COLORS;
  return pool[Math.floor(Math.random() * pool.length)];
};

// ── COLUNA CÍCLICA ──
const MODOS = ['liderados', 'atividades', 'locais'];
const MODO_LABEL = { liderados: 'Liderados', atividades: 'Atividades', locais: 'Locais' };
let modoColuna = 'liderados';

function ciclaModo(dir) {
  const i = MODOS.indexOf(modoColuna);
  modoColuna = MODOS[(i + dir + MODOS.length) % MODOS.length];
  selectedFollower = null;
  selectedFollowerType = null;
  draggedId = null;
  draggedType = null;

let selectedDate = new Date();
function updateDateDisplay() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const sel = new Date(selectedDate);
  sel.setHours(0,0,0,0);
  const diff = Math.round((sel - today) / 86400000);
  let label = selectedDate.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  if(diff === 0)  label = 'Hoje · '  + selectedDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  else if(diff===1)  label = 'Amanhã · ' + selectedDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  else if(diff===-1) label = 'Ontem · '  + selectedDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  document.getElementById('headerDate').textContent = label;
}
function changeDay(delta) {
  selectedDate.setDate(selectedDate.getDate() + delta);
  updateDateDisplay();
}

function toggleDispensa(id) {
  const idx = dispensas.indexOf(id);
  if(idx === -1) {
    dispensas.push(id);
    unassign(id); // remove da distribuição
  } else {
    dispensas.splice(idx, 1);
  }
  save();
  renderLiderados();
  renderDistribuicao();
}

function addSwipeDispensa(el, id) {
  let startX = 0, startY = 0, moved = false, pressing = false;

  // ── TOUCH (mobile) ──
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, {passive: true});
  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(Math.abs(dx) > Math.abs(dy) && dx > 8) {
      moved = true;
      el.style.transform = `translateX(${Math.min(dx * 0.4, 36)}px)`;
      el.style.background = `rgba(231,76,60,${Math.min(dx / 180, 0.18)})`;
    }
  }, {passive: true});
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    el.style.transform = '';
    el.style.background = '';
    if(moved && dx > 55) toggleDispensa(id);
  });

  // ── MOUSE (desktop) ──
  el.addEventListener('mousedown', e => {
    startX = e.clientX;
    startY = e.clientY;
    moved = false;
    pressing = true;
  });
  window.addEventListener('mousemove', e => {
    if(!pressing) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if(Math.abs(dx) > Math.abs(dy) && dx > 8) {
      moved = true;
      el.style.cursor = 'grabbing';
      el.style.transform = `translateX(${Math.min(dx * 0.4, 36)}px)`;
      el.style.background = `rgba(231,76,60,${Math.min(dx / 180, 0.18)})`;
    }
  });
  window.addEventListener('mouseup', e => {
    if(!pressing) return;
    pressing = false;
    const dx = e.clientX - startX;
    el.style.transform = '';
    el.style.background = '';
    el.style.cursor = '';
    if(moved && dx > 55) toggleDispensa(id);
  });
}

function renderLiderados() {
  const el = document.getElementById('listLiderados');
  if(!liderados.length) { el.innerHTML='<div class="empty"><span>👥</span>Nenhum liderado cadastrado</div>'; return; }

  // Separa em dispensa (topo) e os demais, cada grupo em ordem alfabética
  const emDispensa  = alpha(liderados.filter(l =>  dispensas.includes(l.id)));
  const normais     = alpha(liderados.filter(l => !dispensas.includes(l.id)));
  const ordenados   = [...emDispensa, ...normais];

  el.innerHTML = ordenados.map(l => {
    const isDisp = dispensas.includes(l.id);
    return `
      <div class="item-row${isDisp ? ' em-dispensa' : ''}" data-lid="${l.id}">
        <span class="item-name">${l.nome}</span>
        ${isDisp ? '<span class="dispensa-cross">✚</span>' : ''}
        <button class="del-btn" onclick="deleteLiderado('${l.id}')">✕</button>
      </div>`;
  }).join('');
  // Swipe em cada linha
  el.querySelectorAll('.item-row[data-lid]').forEach(row => {
    addSwipeDispensa(row, row.dataset.lid);
  });
}

// ── DISTRIBUIÇÃO ──
let selectedFollower     = null; // id selecionado (mobile)
let selectedFollowerType = null; // 'liderado' | 'atividade' | 'local'
let draggedId            = null; // id arrastado (desktop)
let draggedType          = null; // 'liderado' | 'atividade' | 'local'

function getAssigned() {
  const set = new Set();
  Object.values(distribuicao).forEach(arr => arr.forEach(id => set.add(id)));
  return set;
}

// Liderados: único — remove de qualquer líder antes de atribuir
function assign(lideradoId, liderIdTarget) {
  Object.keys(distribuicao).forEach(lid => {
    distribuicao[lid] = distribuicao[lid].filter(x => x !== lideradoId);
  });
  if(!distribuicao[liderIdTarget]) distribuicao[liderIdTarget] = [];
  distribuicao[liderIdTarget].push(lideradoId);
  save();
}

function unassign(lideradoId) {
  Object.keys(distribuicao).forEach(lid => {
    distribuicao[lid] = distribuicao[lid].filter(x => x !== lideradoId);
  });
  save();
}

// Atividades: repetível — não remove de outros líderes; previne duplicata no mesmo líder
function assignAtiv(atividadeId, liderId) {
  if(!distribuicaoAtiv[liderId]) distribuicaoAtiv[liderId] = [];
  if(!distribuicaoAtiv[liderId].includes(atividadeId)) {
    distribuicaoAtiv[liderId].push(atividadeId);
    save();
  }
}

// Locais: repetível — mesma lógica
function assignLocal(localId, liderId) {
  if(!distribuicaoLocais[liderId]) distribuicaoLocais[liderId] = [];
  if(!distribuicaoLocais[liderId].includes(localId)) {
    distribuicaoLocais[liderId].push(localId);
    save();
  }
}

// Remove de líder específico (atividade/local) ou de todos (liderado)
function removeMembro(id, tipo, liderId, e) {
  if(e) e.stopPropagation();
  if(tipo === 'liderado') {
    unassign(id);
  } else if(tipo === 'atividade') {
    if(distribuicaoAtiv[liderId]) {
      const idx = distribuicaoAtiv[liderId].indexOf(id);
      if(idx !== -1) distribuicaoAtiv[liderId].splice(idx, 1);
      save();
    }
  } else if(tipo === 'local') {
    if(distribuicaoLocais[liderId]) {
      const idx = distribuicaoLocais[liderId].indexOf(id);
      if(idx !== -1) distribuicaoLocais[liderId].splice(idx, 1);
      save();
    }
  }
  selectedFollower = null;
  selectedFollowerType = null;
  renderDistribuicao();
}

function renderDistribuicao() {
  const assigned = getAssigned();
  const livres = liderados.filter(l => !assigned.has(l.id) && !dispensas.includes(l.id));

  // Atualiza label da coluna
  document.getElementById('colModoLabel').textContent = MODO_LABEL[modoColuna];

  // FAB row
  const hasAny = assigned.size > 0 ||
    Object.values(distribuicaoAtiv).some(a => a.length > 0) ||
    Object.values(distribuicaoLocais).some(a => a.length > 0);
  document.getElementById('fabRow').classList.toggle('visible', hasAny);

  // Coluna Líderes (sempre mostra tudo: atividade → local → liderados)
  const lCol = document.getElementById('leadersCol');
  if(!lideres.length) {
    lCol.innerHTML = '<div class="empty" style="font-size:12px;padding:20px 4px">Cadastre líderes primeiro</div>';
  } else {
    lCol.innerHTML = alpha(lideres).map(l => {
      const chipsAtiv = (distribuicaoAtiv[l.id]||[]).map(aid => {
        const a = atividades.find(x => x.id === aid);
        if(!a) return '';
        return `<div class="member-chip">
          <span class="member-label">🎯 ${a.nome}</span>
          <span class="remove-x" onclick="removeMembro('${aid}','atividade','${l.id}',event)">✕</span>
        </div>`;
      }).join('');

      const chipsLocais = (distribuicaoLocais[l.id]||[]).map(lid2 => {
        const loc = locais.find(x => x.id === lid2);
        if(!loc) return '';
        return `<div class="member-chip">
          <span class="member-label">🏠 ${loc.nome}</span>
          <span class="remove-x" onclick="removeMembro('${lid2}','local','${l.id}',event)">✕</span>
        </div>`;
      }).join('');

      const chipsLiderados = (distribuicao[l.id]||[]).map(mid => {
        const m = liderados.find(x => x.id === mid);
        if(!m) return '';
        return `<div class="member-chip">
          <span class="member-label">${m.nome}</span>
          <span class="remove-x" onclick="removeMembro('${mid}','liderado','${l.id}',event)">✕</span>
        </div>`;
      }).join('');

      return `
        <div class="leader-card" id="lcard-${l.id}"
          style="background:${l.color}22; border-color:${l.color}44;"
          onclick="onLeaderClick('${l.id}')">
          <div class="leader-name" style="color:${l.color}">${l.nome}</div>
          <div class="leader-members">${chipsAtiv}${chipsLocais}${chipsLiderados}</div>
        </div>`;
    }).join('');
  }

  // Coluna direita (baseada no modo atual)
  const fCol = document.getElementById('followersCol');

  if(modoColuna === 'liderados') {
    if(!liderados.length) {
      fCol.innerHTML = '<div class="empty" style="font-size:12px;padding:20px 4px">Cadastre liderados</div>';
    } else if(!livres.length) {
      fCol.innerHTML = '<div class="empty" style="font-size:12px;padding:20px 4px;color:#4af77a">✓ Todos alocados!</div>';
    } else {
      fCol.innerHTML = alpha(livres).map(l => `
        <div class="follower-chip" id="fchip-${l.id}"
          onclick="onFollowerClick('${l.id}','liderado')">
          <span>${l.nome}</span>
        </div>
      `).join('');
    }
  } else if(modoColuna === 'atividades') {
    if(!atividades.length) {
      fCol.innerHTML = '<div class="empty" style="font-size:12px;padding:20px 4px">Cadastre atividades</div>';
    } else {
      fCol.innerHTML = alpha(atividades).map(a => `
        <div class="follower-chip" id="fchip-${a.id}"
          onclick="onFollowerClick('${a.id}','atividade')">
          <span>🎯 ${a.nome}</span>
        </div>
      `).join('');
    }
  } else if(modoColuna === 'locais') {
    if(!locais.length) {
      fCol.innerHTML = '<div class="empty" style="font-size:12px;padding:20px 4px">Cadastre locais</div>';
    } else {
      fCol.innerHTML = alpha(locais).map(l => `
        <div class="follower-chip" id="fchip-${l.id}"
          onclick="onFollowerClick('${l.id}','local')">
          <span>🏠 ${l.nome}</span>
        </div>
      `).join('');
    }
  }

  // Restaura estado selecionado (mobile)
  if(selectedFollower) {
    const chip = document.getElementById('fchip-'+selectedFollower);
    if(chip) chip.classList.add('selected-follower');
    else { selectedFollower = null; selectedFollowerType = null; }
  }
}

// ── DRAG (desktop) ──
function onDragStart(e, id, tipo) {
  draggedId = id;
  draggedType = tipo;
  setTimeout(() => {
    const el = document.getElementById('fchip-'+id);
    if(el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd() {
  if(draggedId) {
    const el = document.getElementById('fchip-'+draggedId);
    if(el) el.classList.remove('dragging');
  }
  draggedId = null;
  draggedType = null;
  document.querySelectorAll('.leader-card').forEach(c => c.classList.remove('drag-over'));
}
function onDragOver(e, liderId) {
  e.preventDefault();
  document.querySelectorAll('.leader-card').forEach(c => c.classList.remove('drag-over'));
  document.getElementById('lcard-'+liderId)?.classList.add('drag-over');
}
function onDragLeave(liderId) {
  document.getElementById('lcard-'+liderId)?.classList.remove('drag-over');
}
function onDrop(e, liderId) {
  e.preventDefault();
  if(!draggedId) return;
  if(draggedType === 'liderado')  assign(draggedId, liderId);
  else if(draggedType === 'atividade') assignAtiv(draggedId, liderId);
  else if(draggedType === 'local')     assignLocal(draggedId, liderId);
  draggedId = null;
  draggedType = null;
  document.querySelectorAll('.leader-card').forEach(c => c.classList.remove('drag-over'));
  renderDistribuicao();
}

// ── CLICK (mobile) ──
function onFollowerClick(id, tipo) {
  if(selectedFollower === id) {
    selectedFollower = null;
    selectedFollowerType = null;
    renderDistribuicao();
    return;
  }
  selectedFollower = id;
  selectedFollowerType = tipo;
  renderDistribuicao();
}

function onLeaderClick(liderId) {
  if(!selectedFollower) return;
  if(selectedFollowerType === 'liderado')  assign(selectedFollower, liderId);
  else if(selectedFollowerType === 'atividade') assignAtiv(selectedFollower, liderId);
  else if(selectedFollowerType === 'local')     assignLocal(selectedFollower, liderId);
  selectedFollower = null;
  selectedFollowerType = null;
  renderDistribuicao();
}

// ── RESET (por modo) ──
function resetDistribuicao() {
  distribuicao = {};
  distribuicaoAtiv = {};
  distribuicaoLocais = {};
  lideres.forEach(l => {
    distribuicao[l.id]       = [];
    distribuicaoAtiv[l.id]   = [];
    distribuicaoLocais[l.id] = [];
  });
  selectedFollower = null;
  selectedFollowerType = null;
  save(); renderDistribuicao();
  showToast('Distribuição resetada');
}

// ── LISTAS WHATSAPP ──
function buildListaEquipes() {
  let txt = `📋 *Distribuição do dia ${selectedDate.toLocaleDateString('pt-BR')}*\n\n`;
  let hasContent = false;
  alpha(lideres).forEach(l => {
    const members = (distribuicao[l.id]||[]).map(mid => {
      const m = liderados.find(x => x.id === mid);
      return m ? `  • ${m.nome}` : null;
    }).filter(Boolean);
    if(!members.length) return;
    hasContent = true;
    txt += `👤 *${l.nome}*\n${members.join('\n')}\n\n`;
  });
  return hasContent ? txt.trim() : `📋 *Distribuição do dia ${selectedDate.toLocaleDateString('pt-BR')}*\n\n(Nenhuma atribuição ainda)`;
}

function buildListaCoordenacao() {
  let txt = `📋 *Distribuição do dia ${selectedDate.toLocaleDateString('pt-BR')}*\n\n`;
  let hasContent = false;
  alpha(lideres).forEach(l => {
    const atv = (distribuicaoAtiv[l.id]||[]).map(aid => {
      const a = atividades.find(x => x.id === aid);
      return a ? `  🎯 ${a.nome}` : null;
    }).filter(Boolean);
    const locs = (distribuicaoLocais[l.id]||[]).map(lid2 => {
      const loc = locais.find(x => x.id === lid2);
      return loc ? `  🏠 ${loc.nome}` : null;
    }).filter(Boolean);
    const mems = (distribuicao[l.id]||[]).map(mid => {
      const m = liderados.find(x => x.id === mid);
      return m ? `  • ${m.nome}` : null;
    }).filter(Boolean);
    const lines = [...atv, ...locs, ...mems];
    if(!lines.length) return;
    hasContent = true;
    txt += `👤 *${l.nome}*\n${lines.join('\n')}\n\n`;
  });
  const dispensadosNomes = dispensas.map(id => {
    const l = liderados.find(x => x.id === id);
    return l ? `  • ${l.nome}` : null;
  }).filter(Boolean);
  if(dispensadosNomes.length) {
    txt += (hasContent ? '\n' : '') + `🏥 *Dispensa Médica*\n${dispensadosNomes.join('\n')}`;
    hasContent = true;
  }
  return hasContent ? txt.trim() : `📋 *Coordenação do dia ${selectedDate.toLocaleDateString('pt-BR')}*\n\n(Nenhuma atribuição ainda)`;
}

function openListaModal(tipo) {
  const txt = tipo === 'coordenacao' ? buildListaCoordenacao() : buildListaEquipes();
  document.getElementById('listaTexto').textContent = txt;
  document.getElementById('modalTitulo').textContent =
    tipo === 'coordenacao' ? 'Coordenação 📋' : 'Equipes 👥';
  document.getElementById('modalLista').classList.add('open');
}

function copiarLista() {
  const txt = document.getElementById('listaTexto').textContent;
  try {
    const area = document.createElement('textarea');
    area.value = txt;
    area.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand('copy');
    document.body.removeChild(area);
    showToast('✓ Copiado!');
  } catch {
    showToast('Erro ao copiar');
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.getElementById('modalLista').addEventListener('click', function(e){
  if(e.target === this) closeModal('modalLista');
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
renderDistribuicao();
renderLideres();
renderLiderados();
renderAtividades();
renderLocais();
